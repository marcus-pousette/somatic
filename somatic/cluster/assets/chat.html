<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Somatic</title>
<style>
  :root {
    --bg: #0d1017; --panel: #151a23; --panel-2: #1b212c; --line: #262d3a;
    --text: #e7ecf3; --muted: #8b95a7; --accent: #6ea8fe; --accent-dim: #24344f;
    --user: #223049; --ok: #4ade80; --bad: #f87171; --warn: #fbbf24;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 18px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, #131822, #0f131b);
  }
  .brand { display: flex; align-items: baseline; gap: 9px; }
  .brand b { font-size: 17px; letter-spacing: .3px; }
  .brand .tag { color: var(--muted); font-size: 12px; }
  .split {
    margin-left: auto; display: flex; align-items: center; gap: 10px;
    color: var(--muted); font-size: 12.5px; flex-wrap: wrap; justify-content: flex-end;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 999px; padding: 3px 10px; color: var(--text); font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .pill .n { color: var(--accent); font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--ok); box-shadow: 0 0 8px #4ade8066; }
  .dot.bad { background: var(--bad); }
  .mode { text-transform: uppercase; letter-spacing: .6px; font-size: 10.5px; color: var(--accent); }

  main {
    flex: 1; overflow-y: auto; padding: 26px 0;
  }
  .thread { max-width: 760px; margin: 0 auto; padding: 0 18px; display: flex; flex-direction: column; gap: 18px; }
  .msg { display: flex; gap: 12px; }
  .msg .who {
    flex: 0 0 30px; height: 30px; border-radius: 8px; display: grid; place-items: center;
    font-size: 12px; font-weight: 700; margin-top: 1px;
  }
  .msg.user .who { background: var(--user); color: #cfe0ff; }
  .msg.assistant .who { background: var(--panel-2); color: var(--accent); border: 1px solid var(--line); }
  .bubble { flex: 1; min-width: 0; }
  .bubble .body { white-space: pre-wrap; word-wrap: break-word; }
  .bubble .body.think { color: var(--muted); font-style: italic; border-left: 2px solid var(--line); padding-left: 10px; margin-bottom: 8px; }
  .cursor::after { content: "▍"; color: var(--accent); animation: blink 1s steps(2) infinite; }
  @keyframes blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }

  .empty { max-width: 760px; margin: 8vh auto 0; text-align: center; color: var(--muted); padding: 0 18px; }
  .empty h1 { color: var(--text); font-weight: 650; font-size: 22px; margin: 0 0 6px; }
  .empty p { margin: 4px 0; }
  .empty .hint { margin-top: 18px; font-size: 13px; }

  footer { border-top: 1px solid var(--line); background: #0f131b; padding: 14px 18px; }
  .composer { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1; resize: none; background: var(--panel); color: var(--text);
    border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px;
    font: inherit; max-height: 180px; outline: none;
  }
  textarea:focus { border-color: var(--accent-dim); }
  button.send {
    background: var(--accent); color: #08111f; border: 0; border-radius: 12px;
    padding: 11px 18px; font-weight: 650; cursor: pointer; font-size: 14px;
  }
  button.send:disabled { opacity: .5; cursor: default; }
  .foot-note { max-width: 760px; margin: 8px auto 0; color: var(--muted); font-size: 11.5px; text-align: center; }
</style>
</head>
<body>
  <header>
    <div class="brand"><b>Somatic</b><span class="tag">split-model chat</span></div>
    <div class="split" id="split">
      <span class="pill" id="model-pill">…</span>
      <span class="pill" id="layout-pill" title="layers held per machine">…</span>
      <span class="mode" id="mode">relay</span>
      <span class="dot" id="conn" title="cluster health"></span>
    </div>
  </header>

  <main>
    <div class="thread" id="thread"></div>
    <div class="empty" id="empty">
      <h1>Talk to a model split across your machines</h1>
      <p>Every reply is generated by chaining the transformer layers across the cluster below.</p>
      <p class="hint">Type a message to begin.</p>
    </div>
  </main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Message the cluster…  (Enter to send, Shift+Enter for newline)"></textarea>
      <button class="send" id="send">Send</button>
    </div>
    <div class="foot-note">OpenAI-compatible API at <code>/v1</code> · one generation at a time · boundary: <span id="mode2">relay</span></div>
  </footer>

<script>
const thread = document.getElementById('thread');
const empty = document.getElementById('empty');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const conn = document.getElementById('conn');
let history = [];
let busy = false;
let MODEL = 'model';

async function loadStatus() {
  try {
    const r = await fetch('/api/status'); const s = await r.json();
    MODEL = s.model || 'model';
    document.getElementById('model-pill').textContent = MODEL;
    const layout = s.workers || '';
    const nHosts = (layout.match(/@/g) || []).length || (s.entries ? s.entries.length : 1);
    document.getElementById('layout-pill').innerHTML =
      '<span class="n">' + nHosts + '</span>&nbsp;machine' + (nHosts === 1 ? '' : 's') +
      (layout ? '&nbsp;· ' + layout.replace(/http:\/\//g,'').replace(/\s*->\s*/g,' → ') : '');
    if (s.mode) { document.getElementById('mode').textContent = s.mode;
                  document.getElementById('mode2').textContent = s.mode; }
  } catch (e) { /* keep placeholders */ }
}
async function pollHealth() {
  try { const r = await fetch('/health'); conn.className = 'dot ' + (r.ok ? 'ok' : 'bad'); }
  catch { conn.className = 'dot bad'; }
}

function addMsg(role, initial='') {
  empty.style.display = 'none';
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const who = document.createElement('div'); who.className = 'who';
  who.textContent = role === 'user' ? 'You' : 'AI';
  const bubble = document.createElement('div'); bubble.className = 'bubble';
  const body = document.createElement('div'); body.className = 'body';
  body.textContent = initial;
  bubble.appendChild(body);
  wrap.appendChild(who); wrap.appendChild(bubble);
  thread.appendChild(wrap);
  window.scrollTo(0, document.body.scrollHeight);
  return body;
}

// Split leading <think>…</think> reasoning into a dim block.
function render(body, text) {
  const m = text.match(/^<think>([\s\S]*?)<\/think>\s*([\s\S]*)$/);
  if (m) {
    body.innerHTML = '';
    const t = document.createElement('div'); t.className = 'body think'; t.textContent = m[1].trim();
    const a = document.createElement('div'); a.className = 'body'; a.textContent = m[2];
    body.appendChild(t); body.appendChild(a);
  } else if (/^<think>/.test(text)) {
    body.className = 'body think'; body.textContent = text.replace(/^<think>/, '').trim();
  } else {
    body.className = 'body'; body.textContent = text;
  }
}

async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true; sendBtn.disabled = true; input.value = ''; input.style.height = 'auto';
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  const body = addMsg('assistant', '');
  body.parentElement.parentElement.querySelector('.body').classList.add('cursor');

  let acc = '';
  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ model: MODEL, messages: history, stream: true, max_tokens: 512 }),
    });
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n'); buf = parts.pop();
      for (const p of parts) {
        const line = p.trim();
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]') continue;
        try {
          const j = JSON.parse(data);
          const d = j.choices?.[0]?.delta?.content || '';
          if (d) { acc += d; render(body, acc); window.scrollTo(0, document.body.scrollHeight); }
        } catch {}
      }
    }
    history.push({ role: 'assistant', content: acc });
  } catch (e) {
    render(body, acc + '\n\n[connection error: ' + e.message + ']');
  } finally {
    body.classList.remove('cursor');
    busy = false; sendBtn.disabled = false; input.focus();
  }
}

sendBtn.onclick = send;
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 180) + 'px';
});
loadStatus(); pollHealth(); setInterval(pollHealth, 3000);
input.focus();
</script>
</body>
</html>
